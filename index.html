<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réservation Car Wash</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header {
  background:#87CEEB;
  color:white;
  text-align:center;
  padding:30px;
}

.logo { width:120px; }

section {
  padding:20px;
  text-align:center;
}

.box {
  background:white;
  margin:10px auto;
  max-width:500px;
  padding:15px;
  border-radius:10px;
}

select, input {
  width:90%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.btn {
  display:inline-block;
  background:#25D366;
  color:white;
  padding:12px 20px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
<img src="logo.png.png" class="logo">
<h1>Réservation Car Wash</h1>
<p><b>Le détail fait la différence.</b></p>
</header>

<section>

<div class="box">

<h3>Réserver maintenant</h3>

<select id="service">
  <option value="Basic - 80 DHS">Basic - 80 DHS</option>
  <option value="Full - 130 DHS">Full - 130 DHS</option>
  <option value="Premium - 200 DHS">Premium - 200 DHS</option>
</select>

<input id="heure" type="text" placeholder="Heure (ex: 14h30)">
<input id="zone" type="text" value="Marrakech + 25km">

<a class="btn" href="#" onclick="sendWhatsApp()">Réserver sur WhatsApp</a>

</div>

</section>

<script>
function sendWhatsApp() {
  let service = document.getElementById("service").value;
  let heure = document.getElementById("heure").value;
  let zone = document.getElementById("zone").value;

  let message =
  "Bonjour, je veux réserver un lavage voiture.%0A" +
  "Service : " + service + "%0A" +
  "Heure : " + heure + "%0A" +
  "Zone : " + zone;

  let phone = "212600795000";

  window.open("https://wa.me/" + phone + "?text=" + message, "_blank");
}
</script>

</body>
</html>
