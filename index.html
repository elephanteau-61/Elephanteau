<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éléphanteau Wash</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0B1220;
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:40px 20px;
}

.logo {
  width:110px;
  margin-bottom:10px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0); }
}

h1 {
  font-size:28px;
  margin:10px 0;
}

.subtitle {
  opacity:0.7;
}

/* BUTTONS */
.btn {
  display:block;
  width:85%;
  margin:10px auto;
  padding:14px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  text-align:center;
}

.primary {
  background:#3B82F6;
  color:white;
}

.whatsapp {
  background:#25D366;
  color:white;
}

/* CARDS */
.card {
  background:#111A2E;
  margin:10px auto;
  width:85%;
  padding:15px;
  border-radius:12px;
}

/* INPUTS */
input, select {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

/* SECTION TITLE */
.title {
  text-align:center;
  margin-top:25px;
  font-size:18px;
  color:#93C5FD;
}

/* FOOTER TEXT */
.small {
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png.png" class="logo">
  <h1>Éléphanteau Wash</h1>
  <p class="subtitle">Premium Car Wash • Marrakech</p>
</header>

<!-- RESERVATION -->
<div class="title">Réservation rapide</div>

<div class="card">

<select id="service">
  <option>Basic - 80 DHS</option>
  <option>Full - 130 DHS</option>
  <option>Premium - 200 DHS</option>
</select>

<input id="nom" placeholder="Nom complet">
<input id="telephone" placeholder="Téléphone">
<input id="email" placeholder="Email">
<input id="heure" placeholder="Heure (ex: 14h)">
<input id="adresse" placeholder="Adresse complète">

<a class="btn whatsapp" href="#" onclick="sendWhatsApp()">Réserver sur WhatsApp</a>

</div>

<!-- PACKS -->
<div class="title">Nos Packs</div>

<div class="card">Basic — rapide & extérieur</div>
<div class="card">Full — intérieur + extérieur</div>
<div class="card">Premium — finition premium complète</div>

<!-- ZONE -->
<div class="title">Zone</div>
<div class="card">Marrakech + 25 km</div>

<!-- CTA -->
<a class="btn primary" href="https://instagram.com">Instagram</a>

<div class="small">“Le détail fait la différence”</div>

<script>
function sendWhatsApp() {

  let service = document.getElementById("service").value;
  let nom = document.getElementById("nom").value;
  let tel = document.getElementById("telephone").value;
  let email = document.getElementById("email").value;
  let heure = document.getElementById("heure").value;
  let adresse = document.getElementById("adresse").value;

  let message =
  "Bonjour Éléphanteau Wash,%0A%0A" +
  "Nouvelle réservation premium :%0A%0A" +
  "Nom : " + nom + "%0A" +
  "Téléphone : " + tel + "%0A" +
  "Email : " + email + "%0A" +
  "Service : " + service + "%0A" +
  "Heure : " + heure + "%0A" +
  "Adresse : " + adresse + "%0A%0A" +
  "Merci de confirmer.";

  window.open("https://wa.me/212600795000?text=" + message, "_blank");
}
</script>

</body>
</html>
